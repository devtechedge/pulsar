[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
auto_detect_solc = false
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"

[profile.default.fuzz]
runs = 256
