<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="30%" stop-color="#C4B5FD" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#06070F"/>
  <!-- pulse rings -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#ring)" stroke-width="1.2" opacity="0.25"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="url(#ring)" stroke-width="1.2" opacity="0.45"/>
  <!-- beam jets -->
  <path d="M32 6 L29 28 L35 28 Z" fill="url(#ring)" opacity="0.85"/>
  <path d="M32 58 L29 36 L35 36 Z" fill="url(#ring)" opacity="0.85"/>
  <!-- core -->
  <circle cx="32" cy="32" r="14" fill="url(#core)" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="6" fill="#FFFFFF"/>
</svg>
